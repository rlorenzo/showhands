name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Static analysis report (fallow, non-blocking)
        run: npx --yes fallow
        continue-on-error: true

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        env:
          # the repo default skips downloads for pre-provisioned containers;
          # CI has no pre-installed browser, so allow the download here
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
