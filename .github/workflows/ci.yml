name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# No job writes to the repo; the deploy job authenticates to the droplet
# with its own SSH key rather than GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the fallow regression gate can diff against the base.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Fallow regression gate (fails on newly-introduced findings)
        # Pass context through env, never inlined into the script, so a branch
        # name can't inject shell (GitHub Actions security hardening).
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF"
            base=FETCH_HEAD
          else
            base=HEAD~1
          fi
          echo "Auditing changed files against $base"
          npx fallow audit --base "$base"

      - name: Fallow full report (complexity · duplication · dead code, non-blocking)
        run: npx fallow
        continue-on-error: true

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        env:
          # the repo default skips downloads for pre-provisioned containers;
          # CI has no pre-installed browser, so allow the download here
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  deploy:
    name: Deploy to droplet
    needs: [checks, e2e]
    if: github.repository == 'rlorenzo/showhands' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (droplet runs deploy.sh via forced command)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DROPLET: 24.199.115.162
        run: |
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "DEPLOY_SSH_KEY not set - skipping deploy (checks still ran)."
            exit 0
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DROPLET" >> ~/.ssh/known_hosts 2>/dev/null
          # The CI key is pinned to a forced command on the droplet, so this
          # connection runs deploy/deploy.sh regardless of the command sent.
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            root@"$DROPLET" deploy
